body:
  text: 海國聞見録地理類十外紀之屬提要臣等謹案海國聞見録二卷國朝陳倫炯撰倫炯字資齋同安人父昻康熙二十一年從靖海侯施烺平定臺灣烺又自捜捕餘黨出入東西洋五年叙功授職官至廣東副都統案副都統為滿洲額缺陳昻得授是職葢出特典倫炯少從其父熟聞海道形勢及􅊞父䕃復由侍衛厯任澎湖副將臺灣鎮總兵官移廣東髙雷㢘江南崇明狼山諸鎮又為浙江寧波水師提督皆濱海地也故以平生聞見著為此書上卷記八篇曰天下沿海形勢録曰東洋記曰東南洋記曰南洋記曰小西洋記曰大西洋記曰崑屯記曰南澳氣記下卷圖六幅曰四海總圖曰沿海全圖曰臺灣圖曰臺灣後山圖曰澎湖圖曰瓊州圖凡山川之扼塞道里之逺近沙礁島嶼之夷險風雲氣候之測騐以及外蕃民風物産一一備書雖卷帙無多然積父子兩世之閱厯參稽考驗言必有徵視𠞰傳聞而述新竒據故籍而談形勢者其事固區以别矣其南澳氣記中稱萬里長沙者即列子所謂歸墟莊子所謂尾閭抱朴子所謂沃焦宋史琉球傳所謂落漈但諸書皆言注之不盈倫炯則推以潮長而此溜落潮落而此溜長知水自上入仍自下出其言確切近理足以決千古耳食之疑又史稱丹落漈者一去不返倫炯則謂乗潮長之時求出則外髙内下反不得出如潮落乗南風棹船尚可出雍正丙午有閩船落漈者果如其説得還此語亦前人所未發惟所記七洲洋帶箭鳥謂由郤和呼鳥插箭為記以𨗳海船又記暹羅鬼與鄭和鬬法夜建寺塔今尚在事則蕃俗信鬼有此附㑹之談倫炯不為辨正是亦少疎然是書主于記海道不主于考故實彼國既有此說據而録之固亦無妨宏㫖耳乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
