body:
  text: 海國聞見録卷上浙江提督陳倫炯撰天下沿海形勢録天下沿海形勢從京師天津東向遼海鐵山黃城皮島外對朝鮮左延東北山海關寧逺蓋平復州金州旅順口鴨緑江而抵髙麗右袤東南山東之利津清河蒲臺夀光海倉口登州而至廟島成山衛登州與旅順口南北隔海對峙東懸皮島西匝兩京登萊是為遼海登州一郡陡出東海盡於成山衛海舶往盛京天津者以成山為標準也成山衛轉西南則靖海大嵩萊陽鼇山靈山而至江南海州此皆登州西南之海也海州而下廟灣而上則黃河出海之口河濁海清沙泥入海則沉實支條縷結東向汙長潮滿則沒潮汐或淺或沉名曰五條沙中間深處呼曰沙行江南之沙船往山東者恃沙行以寄泊船因底平少閣無礙閩船到此則魄散魂飛底圓加以龍骨三段架接髙昂閣沙播浪則碎折更兼江浙海潮外無藩扞屏山以緩水勢東向澎湃故潮汐之流比他省為最急乏西風開避舟隨溜閣靡不為壞是以海舶往山東兩京必從盡山對東開一日夜避過其沙方敢北向是以登萊淮海稍寬海防者職由五條沙為之保障也廟灣南自如臯通州而至洋子江口內狼山外崇明鎖鑰長江沙坂急潮其概相似而崇明上鎖長江下扼吳淞東有洋山馬蹟花腦陳錢諸山接連浙之寧波定海外島而嘉興乍浦錢塘之鱉子餘姚之後海寧波之鎮海雖沿海相聨要疆但外有定海為之扞衛實內海之堂奧也惟乍浦一處濱於大海東達漁山北達江南之洋山定海之衢山劒山外則汪洋言海防者當留意焉江浙外海以馬蹟為界山北屬江山南屬浙而陳錢外在東北俗呼盡山山大澳廣可泊舟百餘艘山産水仙海産淡菜蚌屬海鹽小魚賊舟每多寄泊江浙水師更當加意於此南之海島由衢山岱山而至定海東南由劒山長塗而至普陀普陀直東之外出落迦門有東霍山夏月賊舟亦可寄泊伺劫洋舶回棹且與盡山南北為犄角山腳水深非加長掟纜不足以寄普陀之南自﨑頭至昌國衛接聨內地外有韭山弔邦亦賊舟寄泊之所此皆寧波郡屬自寧波台州黃巖沿海而下內有佛頭桃渚嵩門楚門外有茶盤牛頭積榖鱟壳石塘枝山大鹿小鹿在在皆賊艘出沒經由之區南接樂清溫州瑞安金鄉蒲門此溫屬之內海樂清東峙玉環外有三盤鳯凰北屺南屺而至北關以及閩海接界之南關實溫台內外海徑寄泊樵汲之區不可忽也閩之海內自沙埕南鎮烽火三沙斗米北茭定海五虎而至閩安外自南關大嵛小嵛閭山芙蓉北竿塘南竿塘東永而至白犬為福寧福州外護左翼之藩籬南自長樂之梅花鎮東萬安為右臂外自磁澳而至草嶼中隔石牌洋外環海壇大島閩安雖為閩省水口咽喉海壇實為閩省右翼之扼要也由福清之萬安南視平海內虛海套是為興化外有南日湄洲再外烏丘海壇所當留意者東北有東永東南有烏丘猶浙之南屺北屺積榖弔邦韭山東霍衢山江之馬蹟盡山是也泉州北崇武獺窟南祥芝永寧左右拱抱內藏郡治下接金厦二島以達漳州金為泉郡之下臂厦為漳郡之咽喉漳自太武而南鎮海六鼇古雷銅山懸鐘在在可以寄泊而至南澳以分閩粵泉漳之東外有澎湖島三十有六而要在媽宫西嶼頭北港八罩四澳北風可以泊舟若南風不但有山有嶼可以寄泊而平風靜浪黑溝白洋皆可暫寄以俟潮流洋大而山低水急而流回北之吉貝沉礁一線直生東北一目未了內皆暗礁布滿僅存一港蜿蛇非熟習深諳者不敢棹至南有大嶼花嶼猫嶼北風不可寄泊南風時宜巡緝澎湖之東則臺灣北自雞籠山對峙福州之白大洋南自沙馬﨑對峙漳之銅山延綿二千八百里西面一片沃野自海至山淺濶相均約百里西東穿山至海約四五百里崇山叠菁野畨類聚建一郡分四縣山川形勢生熟畨性蜂窠蟻穴志考備載郡治南抱七昆身而至安平鎮大港隔港沙洲直北至鹿耳門鹿耳門隔港之大線頭沙洲而至隙仔海翁隙皆西護府治而港之可以出入巨艘惟鹿耳門與雞籠淡水港其餘港汊雖多大船不能出入僅平底之澎船四五百石之三板頭船堪以出進此亦海外形勢以扞內地沿海要疆南澳東懸海島扞衛漳之詔安潮之黃岡澄海閩粵海洋適中之要隘外有小島三為北澎中澎南澎俗呼為三澎南風賊艘經由暫寄之所內自黃岡大澳而至澄海放雞廣澳錢澳靖海赤澳此雖潮郡支山入海實為潮郡賊艘出沒之區晨逺揚於外洋以伺掠夜西向於島澳以偷泊而海賊之尤甚者多潮産也赤澳一洋自甲子南至淺澳田尾遮浪汕尾鮜門港大星平海雖屬惠州而山川人性與潮無異故於居中碣石立大鎮下至大鵬佛堂門將軍澳紅香爐急水門由虎門而入粵省外自小星筆管沱濘福建頭大崳山小崳山伶仃山旗纛嶼九州洋而至老萬島嶼不可勝數處處可以樵汲在在可以灣泊粵之賊艘不但􅙔艍海舶此處可以伺劫而內河漿船櫓船漁舟皆可出海羣聚剽掠粵海之藏垢納汚者莫此為甚廣省左扞虎門右扼香山而香山雖外護順德新㑹實為省會之要地不但外海捕盜內河緝賊港汊四通奸匪殊甚且共域澳門外防畨舶與虎門為犄角有心者豈可泛視哉外出十字門而至魯萬此洋艘畨舶來往經由之標準下接岸門三竈大金小金烏猪上川下川㢥船澳馬鞍山此肇屬廣海陽江雙魚之外護也髙郡之電白外有大小放雞吳川外有硇州下鄰雷州白鴿錦囊南至海安自放雞而南至於海安中懸硇州暗礁暗沙難以悉載非深諳者莫敢內行而髙郡地方實藉沙礁之庇也雷州一郡自遂溪海康徐間向南幹出四百餘里而至海安三面濵海幅濶百里對峙瓊州渡海百二十里自海安繞西北至合浦欽州防城而及交址之江平萬寧州延長一千七百里故海安下亷州船宜南風上宜北風自亷之冠頭嶺而東白龍調埠川江永安山口烏兔處處沉沙難以名載自冠頭嶺而西至於防城有龍門七十二徑徑徑相通徑者島門也通者水道也以其島嶼懸雜而水道皆通亷多沙欽多島地以華夷為限而又産明珠不入於交址是以亭建海角於亷天涯於欽瓊州屹立海中地從海安渡脉南崖州東萬州西儋州北瓊州與海安對峙瓊山文昌樂㑹陵水感恩臨髙定安澄邁沿海諸州縣環繞熟黎而熟黎環繞生黎而生黎環繞五指嶺七指山五指西向七指南向周圍陸路一千五百三十里府城中路直穿黎心至崖州五百五十五里萬州東路直穿黎心至儋州五百九十里自海口港之東路沿海惟文昌之潭門港樂會之新潭那樂港萬州之東澳陵水之黎菴港崖州之大蛋港西路沿海惟澄邁之馬裊港儋州之新英港昌化之新潮港感恩之北黎港可以灣泊船隻其餘港汊雖多不能寄泊而沿海沈沙行舟實為艱險內山生黎嵐瘴殊甚吾人可住熟黎而不可住生黎生黎可住熟黎而不可到吾地熟黎夾介其間以水土習宜故也此亦海外稍次之臺灣惜乎田疇不廣歲仰需於髙雷雖産楠沉諸香等於廣南甲於諸畨又非臺灣沃野千里所可比擬也東洋記天地之大何物不容輕清之氣包涵萬類星辰日月亦有所不及而聖人測理備至定四方製指南分二十四籌由近之逺莫出範圍啓後世愚䝉識萬國九州然而九州之外又有九州謹按四方外國地方海道人物風土粗據所見聞而略志之俾後之君子有所採擇朝鮮居天地之艮方聨盛京對天津古箕子地分郡縣幅員里道朝貢經由歷代史典輿圖備紀無容勦說其南隔一洋日本國屬之對馬島順風一夜可抵明關白為亂者是也自對馬島而南寅甲卯東方一帶七十二島皆日本倭奴之地而與中國通貿易者惟長﨑一島長﨑産乏粟菽難供食指開貿易入公家通計終歲所獲利就長﨑按户口均分國王居長﨑之東北陸程近一月地名彌耶榖譯曰京受封漢朝王服中國冠裳國習中華文字讀以倭音豫奪之權軍國政事柄於上將軍王不干預僅食俸米受山海貢獻上將軍有時朝見而已易代爭奪不爭王而爭上將軍倭人記載自開國以來世守為王昔時上將軍曾篡奪之山海應貢之物不産五榖不登隂陽不順退居臣位然後順若如故至今無敢妄冀者官皆世官世祿遵漢制以刺史千石為名祿厚足以養亷故少犯法即如年僉舉一街官街官者鄉保也歲給贍養五十金事簡而閒通文藝者為髙士優以禮免以徭俗尚淨潔街衢時為拭滌夫妻不共湯羮飲餘婢僕尚棄之富者履坐絮席貧者履坐薦席名曰毯踏棉各家計攤毯踏棉之多寡為户口男女衣服大領濶袖女加長以曵地畫染花卉文采褌用帛幅裹繞足著短襪以曵履男束帶以插刀髠鬚而剃頂額留鬢髮至後枕濶寸餘向後一挽而繫結髮長者修之女不施脂而傅粉不帶鮮花剪綵簮珥而插玳瑁緑髮如雲日加滌洗薰灼楠沉髻挽前後爪甲無痕惟恐納垢至於男女眉目肌理不敢比勝中華亦非諸畨所能比擬實東方精華之氣所萃人皆覆姓其單姓者徐福配合之童男女也徐福所居之地名曰徐家村其冢在熊指山下其國男子年五十餘陽多痿奴者儂也故呼之曰倭奴俗尊佛尚中國僧敬祖先時掃墳廬得香花佳果非敬佛僧則上祖墳人輕生有犯法者事覺向荒山割肚自殺無纍他人立法最嚴人無爭鬬語言寂寂呼童僕鳴掌則然諾無售買人口傭工期滿即歸所統屬國二北對馬島與朝鮮為界朝鮮貢於對馬而對馬貢於日本南薩㟃馬與琉球為界琉球貢於薩㟃馬而薩㟃馬貢於日本二島之王俱聽指揮氣候與山東江浙齊長﨑與普陀東西對峙水程四十更厦門至長﨑七十二更北風從五島門進南風從天堂門進對馬島坐向登州薩㟃馬坐向溫台地産金銀銅漆器磁器紙箋花卉染印海産龍涎香鰒魚海參佳蔬等類薩㟃馬山髙巉巖溪深水寒故刀最利兼又産馬人壯健嘉靖間倭冦者薩㟃馬是也日本原市舶永嘉因倭之漁者十八人被風入中國奸人引之為亂髠鬚剃額雜以逺處土語遞相攘掠羣稱倭奴後平回國僅十八人王正以法隨禁市舶中國聽我彼往至今無敢來者倭載十八竒士普陀往長﨑雖東西正向直取而渡橫洋風浪巨險諺云日本好貨五島難過厦門往長﨑乘南風見臺灣雞籠山北至米糠洋香菌洋再見薩㟃馬大山天堂方合正針糠菌二洋者洋中水面若糠粃水泡若菌菌呼之為米糠洋香菌洋薩㟃馬而南為琉球也居於乙方計水程六十八更中山國是也習中國字人弱而國貧産銅器紙螺甸玳瑁無可交易其衣冠人物貢由福州久熟習見故不詳載自日本琉球而東水皆東流莊子所謂尾泄之不知何時已而不虛也東南洋記東南諸洋自臺灣而南臺灣居辰巽方北自雞籠山至南沙馬﨑延袤二千八百里與福興泉漳對峙隔澎湖水程四更隔厦門水程十有一更西面一帶沃野東面俯臨大海附近輸賦應徭者名曰平埔土畨其山重叠野畨穴處難以種數捕鹿而食薯芋為糧不知年歲以黍熟釀酒合歡為年性好殺以人顱為寶文身黑齒種種不一晨聽鳥音以卜行事吉凶男女野合成耦逮崇禎間為紅毛荷蘭人所據就安平大港建炮臺城三層以防海口教習土畨耕作令學西洋文字取鹿皮以通日本役使勞瘁畨不聊生鄭芝龍昔鯨鯢海上娶倭婦翁氏生成功隨帶數十倭奴聚泊臺灣視海外荒島不足以有為仍冦江浙閩粵因囑其子曰倘不可為臺灣有如虬髯之安及鄭成功冦鎮江敗歸阻守金厦始謀取臺灣㑹荷蘭之通事何斌逋夷負釣鹿耳門知港路深淺說成功聯檣並進荷蘭嚴守安平大港成功從鹿耳門進水漲三丈餘入據臺灣與荷蘭相持甚久因喻之曰臺灣係我先世所有現存倭人為爾等所據今還我地資貨無染荷蘭悉衆而去至康熙二十二年鄭克塽歸順方入版圖以承天府為臺灣府天興州為諸羅縣萬年州為臺灣鳳山二縣雍正二年分諸羅北之半線為彰化縣鳳山沙馬﨑之東南有吕宋居巽方厦門水程七十二更北面髙山一帶逺視若鋸齒俗名宰牛坑山有土畨屬於吕宋與沙馬﨑西北東南逺拱中有數島惟一島與臺灣稍近者名曰紅頭嶼有土畨居住無舟楫往來語言不通食薯芋海族之類産沙金臺灣曾有舟到其處吕宋大山北從宰牛坑延繞東南昔為大西洋干絲臘是班呀所據地宜粟米長者五六分漳泉人耕種營運者甚盛年輸丁票銀五六金方許居住經商惟守一隅四方分定不許越界廣納丁票聽憑貿易東南洋諸畨惟吕宋最盛因大西洋干絲臘是班呀畨舶運銀到此交易絲綢布帛百貨盡消島畨土産雲集西洋立教建城池聚宗族地原係吕宋土畨今為據轄漢人娶本地土畨婦者必入其教禮天主堂用油水畫十字於印堂名曰澆水焚父母神主老終歸天主堂穵坑土親膚而埋富者納資較多寡埋堂上基內貧者埋墻外三年一清棄骸骨於深澗所有家資明於公堂天主妻子作三股均分其蠱殊甚母傳女而不傳子即如牛皮火腿咒法縮小如沙令人食而脹斃又有蝦蟆魚蠱之類彼能咒解從口躍出成盆禁龍陽父子兄弟亦不得共寢席夜啓戶聽彼稽察拭床席驗有兩溫氣者捕以買罰晨鳴鐘為日方許開市肆經營午鳴鐘為夜闔市寂閉不敢往來昏鳴鐘為日燈燭輝煌如晝營生夜半鳴鐘為夜以閉市肆晝夜各以三時辰為日為夜傍午捉夜禁闔地皆鬼市下接利仔叐水程十二更至甘馬力水程二十一更二處漢人從吕宋舟楫往彼貿易利仔叐之東南隔海對峙有五島班愛惡黨宿務猫務烟網巾礁腦中國俱有洋艘往通均係土畨族類山海所産與吕宋同如鹿麂牛皮筋脯蘇木烏木降香束香黃蠟燕窩海參等類水程必由吕宋之利仔叐海而南吕宋至班愛十更至惡黨二十三更至宿務二十四更至網巾礁腦五十八更人愚罔有知識家無所蓄需中國布帛以蔽身國各有王惟謹守國土其東南又有萬老髙丁機宜二國居於已方國土人物産類相似水程吕宋至萬老髙一百七十四更至丁機宜二百一十更由吕宋正南而視有一大山總名無來由息力大山山之東為蘇祿從古未奉朝貢雍正戊申六年至閩貢獻西鄰吉里問又沿西文萊即古婆羅國再繞西朱葛礁喇大山之正南為馬神其山之廣大長短莫能度測山中人跡所不到産野獸亦莫能名其狀蘇祿吉里問文萊三國皆從吕宋之南分籌而朱葛礁喇必從粵南之七洲洋過崑崙茶盤向東而至朱葛礁喇一百八十八更馬神亦從茶盤噶喇吧而往水程三百四十更厦門由吕宋至蘇祿水程不過一百一十更共在一山南北逺近相去懸殊矣又隔東海一帶為芒佳虱大山由馬神至芒佳虱水程二十七更復繞而之東即係丁機宜東北係萬老髙而蘇祿吉里問文萊朱葛礁喇總名皆為無來由繞阿畨性喜銅鉦器皿皆銅沿溪箬屋為居俗甚陋身不離刃精於標槍見血即斃以采色布帛成幅衣身經商其地往來乘莽甲即小舟夥從持利器相隨産珍珠氷片玳瑁海參燕窩烏木降香海菜藤等類而馬神畨性相似人尤狡獪紅毛人曾據其港口欲占其地畨畏火炮莫敢敵入山以避用毒草浸洗上流使其受毒而自去産鋼鑽胡椒檀香降香科藤豆蔲氷片鉛錫燕窩翠羽海參等類鑽有五色金黑紅者為貴置之暮夜密室光能透徹投之爛泥汚中上幔青布其光透出各畨以為首寶大如棋子直價十萬餘兩西洋人購之為至寶吕宋至吉里問三十九更至文萊四十二更此皆東南洋畨國而朱葛礁喇馬神非從吕宋水程應入南洋各國因同蘇祿文萊南北大山是以附載東南洋俾覽者識其形勢焉南洋記南洋諸國以中國偏東形勢用針取向俱在丁未之間合天地包涵大西洋按二十四盤分之即在巽巳矣就安南接聫中國而言海接亷州山繞西北而環南直至占城形似半月名曰廣南灣秦象郡漢交址唐交州宋安南明交址陸接兩粵雲南風土人物史典備載後以淳化新州廣義占城謂廣南因舅甥委守淳化隨據馬龍角炮臺北隔一水與交址炮臺為界自淳化而南至占城為廣南國亦稱安南王阮姓本中國人氏古日南郡産金楠沉諸香鉛錫桂皮象牙綾絹燕窩魚翅赤菜糖與交址相類以交址為東京廣南為西京强於交址南轄祿賴東埔寨崑大嗎西南鄰暹羅西北接緬甸栽䓶竹為城人善沒紅毛呷板風水不順溜入廣南灣內者國遣小舟數百人背竹筒攜細縷沒水密釘細縷於呷板船底逺漿牽曳船以淺閣火焚而取其輜重今紅毛呷板以不見廣南山為戒見則主駕舟者曰夥長國有常刑厦門至廣南由南澚見廣之魯萬山瓊之大州頭過七洲洋取廣南外之呫嗶囉山而至廣南計水程七十二更交址由七洲西繞北而進厦門至交址水程七十四更七洲洋在瓊島萬州之東南凡往南洋者必經之所中國洋艘不比西洋呷板用混天儀量天尺較日所出刻量時晨離水分度即知為某處中國用羅經刻漏沙以風大小順逆較更數每更約水程六十里風大而順則倍纍之潮頂風逆則減退之亦知某處心尚懷疑又應見某處逺山分别上下山形用繩駝探水深淺若干駝底帶蠟油以粘探沙泥各各配合方為確準獨於七洲大洋大洲頭而外浩浩蕩蕩罔有山形標識風極順利對針亦必六七日始能渡過而見廣南呫嗶囉外洋之外羅山方有準繩偏東則犯萬里長沙千里石塘偏西則恐溜入廣南灣無西風不能外出且商船非本赴廣南者入其境以為天送來稅物倍加均分猶若不足比於紅毛人物兩空尚存中國大體所謂差毫釐失千里也七洲洋中有種神鳥狀似海雁而小喙尖而紅腳短而緑尾帶一箭長二尺許名曰箭鳥船到洋中飛而來示與人為準呼是則飛而去間在疑似再呼細看决疑仍飛而來獻紙謝神則翺翔不知其所之相傳王三寶下西洋呼鳥插箭命在洋中為記廣南沿山海至占城祿賴繞西而至東埔寨厦門至占城水程一百更至東埔寨水程一百一十三更東埔寨雖另自一國介在廣暹二國之間東貢廣南西貢暹羅稍有不遜水陸各得並進而征之畨係白頭無來由裸體居多以布幅圍下身名曰水幔讀平聲地産鉛錫象牙翠毛孔雀洋布蘇木降香沉束諸香燕窩海菜藤自東埔寨大山繞至西南為暹羅由暹羅沿山海而南為斜仔六坤大哖丁噶呶彭亨山聨中國生向正南至此而止又沿海繞山之背過西與彭亨隔山而背坐為柔佛由柔佛而西為麻喇甲即丁噶呶之後山也由麻喇甲而西出於雲南天竺諸國之西南為小西洋戈什噠暹羅沿山海而至柔佛諸國各皆有王均受暹羅國所轄古分羅暹二國後合為暹羅國俗崇佛王衣文彩佛像肉貼飛金用金皿陸乘象亭象輦舟駕龍鳳分官屬曰招誇以裸體跣足俯腰蹲踞見尊貴不衣褌而圍水幔尊敬中國用漢人為官屬理國政掌財賦城郭軒豁沿溪樓閣羣居水多鱷魚從海口至國城溪長二千四百里水深濶容洋舶隨流出入通黃河支流夾岸大樹茂林猿猴采雀上下呼鳴畨村錯落田疇饒廣農時闔家棹舟耕種事畢而回無俟鋤耘榖熟仍棹收穫而歸粟藳長二丈許以為入貢土物因播秧畢而黃河水至苗隨水以長水尺苖尺水丈苗丈無潦傷之患水退而稻熟矣幹河入中國勢猛而急支河入西域歸東埔寨暹羅以出海勢散而緩田疇藉以肥饒故産米之國石可三星俗語捕鹿枝頭牽牛上樓蓋鹿為水漂沒閣息於樹梢溪屋為水注浸引牛於樓人有被虎噉鱷吞者告於畨僧僧咒拘而虎自至咒攄綿紗於水而鱷自縛剖而視之形骸猶存有受蠱者向僧求咒則解是以俗重佛教富者卒後葬以穵即釋氏塔也又有一種男女名謂尸羅蠻與人無異但目無瞳子人娶之亦生男女夜眠魂變為貍狗率類向水厠嗜食糞穢將明附魄若熟睡翻覆其身魂不得附歸女為經紀人戲以酸柑擠汁噀之眼淚長流而不可忍人染痢者若不洗滌夜為尸羅蠻䑛食化作小物入榖道而食腸腹故居暹之人以近水搭厠便於淨滌又有一種共人共者咒法名也刀刃不能傷王養以為兵衛犯事應刑令畨僧以咒勸化之使其自退共法方與受刑國多祟魔相傳三寶到暹羅時畨人稀少鬼祟更多與三寶鬬法勝許居住一夜各成寺塔將明而三寶之寺未及覆瓦視鬼之塔已成引風以側之用頭巾頂插花代瓦幔覆今其塔尚側三寶寺殿今朽爛棕繩猶存於屋瓦洋艘於蓬頂桅上加一布帆以提吊船身輕快為頭中頂又於篷頭之傍加一布帆以乘風力船無欹側而加快為插花畨病每向三寶求藥無以濟施藥投之溪令其水浴至今畨唐人尚以浴溪澆水為治病外洋諸畨以漢人呼唐人因唐時始通故也畨俗死後焚而後葬為消除罪孽又一種生前發願死後恬問飼鳥飼魚者恬問即捨身也恬問鳥置之山石之上羣鳥翺翔畢集然後內一烏紅嘴足先下而啄羣鳥集下頃刻僅存髏骨收而埋之恬問魚焚化存灰和麵作塊投之溪亦有先飼鳥後飼魚兩者皆兼之矣國造巨艦載萬餘石求桅木於深山大樹先以咒語告求允許方敢下斧不則樹出鮮血動手者立亡用牛挽輦沿途畨戲以悅之咒語以勸之少有不順則拔木而自回舊地挽至厰所其靈方息産銀鉛錫洋布沉束象牙犀角烏木蘇木氷片降香翠毛牛角鹿筋藤席佳文席藤黃大楓子豆蔲燕窩海參海菜以銀豆為幣大者重四錢中者一錢次者五分小者二分五釐其名曰潑皆王鑄字號法不得剪碎零用找以海螺巴厦門至暹羅水程過七洲洋見外羅山向南見玳瑁洲鴨洲見崑崙偏西見大真嶼小真嶼轉西北取筆架山向北至暹羅港口竹嶼一百八十八更入港又四十更共水程二百二十八更而東聨東埔寨僅水程一百十三更何以相去甚逺蓋東埔寨南面之海一片盡屬爛泥故名爛泥尾下接大橫山小橫山是以紆回外繞而途逺也由暹羅而南斜仔六坤宋腳皆為暹羅屬國大哖吉連舟丁噶呶彭亨諸國沿山相續俱由小真嶼向西分往水程均一百五六十更不等土産鉛錫翠毛佳文席燕窩海參科藤氷片等類相同惟丁噶呶胡椒甲於諸畨為美畨皆無來由族類不識義理裸體挾刃下圍幅幔檳榔夾烟嚼國米和水吞貿易難容多艘而柔佛一國山雖聨於彭亨其勢在下水程應到崑崙用未針取茶盤轉西至柔佛計厦門水程一百七十三更畨情與上諸國相似而所産相同較之略美而倍多年經商可容三四舶就舟交易産沙金國以鑄花小金錢為幣重四五分銀幣不行由柔佛而西麻喇甲亦係無來由族類官屬名曰惡耶國王倣暹羅用漢人理國事掌財賦産金銀西洋布犀角象牙鉛錫胡椒降香蘇木燕窩翠毛佳文席等類金錢銀幣皆互用往西海洋中國洋艘從未經歷到此而止厦門水程二百六十更至於小西洋烏鬼國大西洋雖與大塊相聨西洋呷板來往語具大小西洋記麻喇甲南隔海對峙大山為亞齊係紅毛人分駐凡紅毛呷板往小西洋等處埔頭貿易必由亞齊經過添備水米自亞齊大山生繞過東南為萬古屢盡處與噶喇吧隔洋對峙紅毛回大西洋者必從此洋出然後向西南過烏鬼呷繞西至大西洋就中國往噶喇吧而言必從崑崙茶盤純用未針西循萬古屢山而至噶喇吧厦門計水程二百八十更原係無來由地方為紅毛荷蘭所據分官屬名曰呷必丹外統下港萬丹池問三處下港産胡椒萬丹另埔頭池問産胡椒檀香而噶喇吧甲諸島畨埔頭之盛各處船隻聚集貿易中國大西洋小西洋白頭烏鬼無來由島畨罄珍寶物食無所不至荷蘭建城池分埔頭中國人在彼經商耕種者甚多年給丁票銀五六金方許居住中國人口浩盛住此地何啻十餘萬近荷蘭亦以新唐禁革不許居住令隨船而回茶盤一島居崑崙之南毗於萬古屢山之東皆南洋總路水程分途處島畨捕海為生産佳文草頂細而長者年僅足二席之用入王家辟蟲蟻值價四五十金次者二三十金再次十金值一二金者猶錦繡布褐之相去也小西洋記小西洋居於內午丁未方從麻喇甲暹羅繞西沿山而至於白頭畨國人即西域之狀捲鬚環耳衣西洋布大領小袖纒腰裹白頭故以白頭呼之國有二東為小白頭西為包社大白頭二國北接三馬爾丹即噶爾旦之本國也而三馬爾丹之北鄰細密里也國而細密里也之西為俄羅斯國小白頭東鄰民呀國民呀人黑穿著皆白類似白頭英機黎荷蘭佛蘭西聚此貿易民呀之東接天竺佛國民呀之東南逺及暹羅民呀之南臨海民呀之北接哪嗎西藏及三馬爾丹國屬而小白頭南入於海之地曰戈什嗒東西南三面皆臨大海外懸一島曰西崙中産大珠戈什嗒東之沿海地名有三曰網礁臘係英機黎埔頭曰房低者里係佛蘭西埔頭曰呢顔八達係荷蘭埔頭西之沿海地名有二曰蘇喇曰網買皆英機黎埔頭其地俱係紅毛置買所建也包社大白頭國東鄰小白頭北與小白頭皆聨三馬爾丹西北枕裏海西鄰東多爾其西南鄰阿黎米也南鄰大海多爾其分東西二國皆回回東多爾其國不通海東鄰大白頭東北傍裏海北接惹鹿惹也西鄰西多爾其南接阿黎米也裏海者諸國環而繞之東北細密里也西北俄羅斯東三馬爾丹西惹鹿惹也西南東多爾其南包社大白頭內注大海不通海棹其水惟從包社出海故為裏海惹鹿惹也一國亦不通海東傍裏海西傍死海北聨俄羅斯南接東西多爾其女人姿色美而毛髮紅氣味臭衣著同白頭貢於包社死海者即黑海源從地中北俄羅斯南西多爾其東惹鹿惹也西民哖呻四面環繞不通大海故為死海而西多爾其民哖呻二國不通小西洋之海而濵於中海之東北中海係從大西洋之海而入語附大西洋記阿黎米也東鄰包社大白頭北接東西多爾其西北濵於大西洋之中海西聨烏鬼國陸地一隅自西至西南與烏鬼之地隔對一海南臨大洋國為多爾其所屬貢男女於多爾其為奴婢烏鬼國東北山與阿黎米也相聨向西南生出坤申方大洋何啻四五國之逺其盡處曰呷即中國支山入海盡處曰表表者標也佛蘭西曰呷英機黎曰岋皆順毛烏鬼地方是以紅毛呷板從小西洋來中國者由亞齊之北麻喇甲之南穿海過柔佛出茶盤而至崑崙自呷而東至戈什嗒自戈什嗒而東至亞齊其海皆呼曰小西洋人黑白不同皆西域裝束長衫大領小袖裹頭纒腰國富庶産寶器生銀洋布丁香肉果水安息吧喇沙末油蘇合油等類以金為幣鑽石為寶大西洋記按紅毛等國居於西北辛戌乾方而烏鬼自坤申而繞極西至庚酉方皆烏鬼族類之國總而名之曰大西洋按天圖分度十二月日月方行到之度正當烏鬼地方之呷處乾艮坤三方博厚相均而於巽巳之地缺少故外生東南斷續諸國尚未適均而又於噶喇吧萬古屢之東南另生一地以補東南之缺因人蹟不到尚未立名曾詢之佛蘭西人云昔時伊國呷板曾到彼處地有土人語言不通執數人而去後國王遣載之回此所以地面正四方於適均之處未均而又補之也是以西洋人志四方洋名以東南缺處之海洋為小東洋戈什嗒為小西洋日本為大東洋紅毛為大西洋烏鬼國地方其順毛烏鬼北與小西洋阿黎米也之山相聨沿海生向西南坤申方而盡呷處方繞向西北與誾年烏鬼王國為界又於呷之東面懸海大山係嗎哩呀氏簡烏鬼一國間有舟楫通粵東自誾年又向西北復繞出極西酉方一帶皆誾年卷毛烏鬼地方又自西復往西北與蘇麻勿里烏鬼為界中有一國亦名烏鬼國王西面皆沿海接聨北面一帶陸地俱聨蘇麻勿里東與接聨阿黎米也之順毛烏鬼為界周圍皆屬烏鬼地方種類繁多肌骨皆黑生相不一地方廣濶難以族舉沿海亦有通舟楫貿易者各國以爭鬭攘掠為事所掠人口活者俟紅毛經過售買為奴死者類牲畜剖塊晒乾為食蘇麻勿里西臨大洋北鄰彌黎吕黎惹林二國南北相聨人口稀少山林深密多産竒狀野獸彌黎吕黎惹林西臨大洋北一帶與猫喇猫里也毗聨猫喇猫里也乃回回族類多為海賊在中海西海劫掠西臨大洋北一帶與紅毛隔中海對峙海從西入東自隔海之西北而東沿中海有葡萄呀是班呀佛蘭西那嗎民哖呻西多爾其而盡中海之東處阿黎米也由阿黎米也而向西直出至西洋皆猫喇猫里也中海沿邊之地南北東諸國三面夾繞惟西通外海是為中海海産珊瑚西洋人來中國者謂中海阿黎米也之地西聨烏鬼陸地處恨不能用刀截斷即於中海可通阿黎米也內海而出小西洋戈什塔至亞齊出茶盤何用繞極西極西南極東南而至噶喇吧北上茶盤逺近相去年餘之逺也葡萄牙者澚門之祖家也東北二面地鄰是班呀西臨大洋南俯中海是班呀者吕宋之祖家也西北臨大洋東南俯中海西鄰葡萄呀東北接佛蘭西佛蘭西者西臨大洋北接荷蘭南鄰是班呀東接那嗎東南俯中海由中海之東接聨那嗎那嗎者天主國王處也北接黃祁東沿中海而至民哖呻由民哖呻沿東南中海而至西多爾其由西多爾其東沿中海至阿黎米也由阿黎米也向西沿中海之南猫喇猫里也之地而出西洋民哖呻者天主之族類也其地東至死海西接那嗎北鄰挽雅黃祁二國南臨中海荷蘭者噶喇吧之祖家也西鄰佛蘭西沿佛蘭西而至西北皆臨大海西北隔海對峙英機黎東鄰黃祁南接那嗎由荷蘭北海而至黃祁黃祁者均係紅毛種類素未通中國近有舟楫來粵營生南接那嗎民哖呻東鄰普魯社普魯社係俄羅斯種類也西北接吝因東鄰細密里也南接惹鹿惹也沿海而至細密里也皆屬北海吝因者西北海之國亦係紅毛種類素未通中國西南隔海與英機黎對峙細密里也東鄰加里勿東南接噶爾旦三馬爾丹南至裏海西鄰俄羅斯北係北海英機黎一國懸三島於吝因黃祁荷蘭佛蘭西四國之西北海自吝因沿海而東繞俄羅斯自俄羅斯而東至細密里也皆為北海不能行舟海冰不解故為冰海自吝因而南至烏鬼諸國皆為大西洋紅毛者西北諸畨之總名淨鬚髮披帶赭毛戴青氈卷笠短衣袖緊襪而皮履髙後底略與俄羅斯至京師者相似髙凖碧眸間有與中國人相似者身長而心細巧凡製作皆堅緻巧思精於火炮究勘天文地理俗無納妾各國語言各别以摘帽為禮而尊天主者惟干絲腦是班呀葡萄呀黃祁為最而辟之者惟英機黎一國産生銀哆囉呢羽毛緞嗶吱玻璃等類崑崙又呼崑屯崑崙者非黃河所繞之崑崙也七洲洋之南大小二山屹立澎湃呼為大崑崙小崑崙山尤甚異上産佳果無人蹟神龍蟠踞昔荷蘭失臺灣邉海界禁未復因金厦二島平荷蘭掠普陀毁銅像銅鐘萬厯間宫塑脫紗佛像刀刃不能傷駕火炮壞之取裏所實金銀財寶見像必剖以取臟寶悉收而去至崑崙意欲居之龍與為患藉火炮與龍鬭相持有日後荷蘭狀若顛狂自相戲以曲腕擊背心日益斃揚帆而去將至噶喇吧船擊碎存活者可十人雍正丁未歲夏噶喇吧海面立一中國婦人羣相棹舟往視惟浮一銅鐘上鐫普陀白華庵知為昔荷蘭掠沉回浙洋艘互相爭載以藉神庇公議求筊余戚末黃姓彥者本船柁師得筊載回通港之艘惟此舟小而舊敝順帆不及月抵南澳後轉運至普陀别船堅緻有被劫紅毛者有失風水者佛力如此前惟付之劫數耳余少隨先君任浙聞之白華住持剖疑者常言小沙彌時在山被紅毛劫掠逃匿虛張情景今恍惚將三十年恨僧未之見也康熙四十五六年間紅毛又圖崑崙不敢近山居住就海傍立埔頭以崑崙介各洋四通之所嗜涎不休有中國洋艘載磚瓦往易紅毛洋貨以其本亷而利大夜團宿於沙洲人寂寂稀少後密窺知為鱷魚步岸所吞伐木圍柵稍寧夜聞山中語語促歸紅毛為水土不服斃者甚多又為廣南畨劫殺殆盡仍虛其地凡中國洋艘田崑崙者備雞鵝毛鱟壳等類到崑崙洋天時極晴霽見黑雲一㸃隨化為含烟蜿蛇搖尾即如江浙夏月湖中雲龍下篷惟恐不及狂風立至幸不及時而霽俗呼鼠尾龍風白雲者其風尤甚日遇二三次或四五次間或不遇者少故以翎毛鱟壳焚穢氣以觸逺揚過崑崙則無南澳氣南澳氣居南澳之東南嶼小而平四面掛腳皆古石底生水草長丈餘灣有沙洲吸四面之流船不可到入溜則吸閣不能返隔南澳水程七更古為落漈北浮沉皆沙垠約長二百里計水程三更餘盡北處有兩山名曰東獅象與臺灣沙馬﨑對峙隔洋濶四更洋名沙馬﨑頭門氣懸海中南續沙垠至粵海為萬里長沙頭南隔斷一洋名曰長沙門又從南首復生沙垠至瓊海萬洲曰萬里長沙沙之南又生古石至七洲洋名曰千里石塘長沙一門西北與南澳西南與平海之大星鼎足三峙長沙門南北約濶五更廣之畨舶洋艘往東南洋吕宋文萊蘇祿等國者皆從長沙門而出北風以南澚為準南風以大星為準惟江浙閩省往東南洋者從臺灣沙馬﨑頭門過而至吕宋諸國西洋呷板從崑崙七洲洋東萬里長沙外過沙馬﨑頭門而至閩浙日本以取弓弦直洋中國往南洋者以萬里長沙之外渺茫無所取準皆從沙內粵洋而至七洲洋此亦山川地脉聯續之氣而於汪洋之中以限海國也沙有海鳥大小不同少見人遇舟飛宿人捉不識懼搏其背吐魚蝦以為羮余在臺丙午年時有閩船在澎湖南大嶼被風折桅飄沙壞有二十人駕一三板腳舟用被作布帆回臺餓斃五人余詢以何處擊碎彼僅以沙中為言不識地方又云潮水溜入不得開出余語之曰此萬里長沙頭也尚有舊時擊壞一呷板潮雖溜入汝等若以南風棹長潮再不得歸矣大洋之水為沙兩隔節次斷續南北沙頭為潮汐臨頭四面合流外長而內退外退而內長須沿沙節次撑上斷續沙頭夾退流乘南風東向盡流南退雖欲北上求生而南下者正所以生也何也南風夾退潮方能出溜雖溜下然而歸於大海不入內溜方得乘南風而歸羣起而呼曰曾到此地乎不則何為知之確且詳有如目覩壞呷板尚存為飛沙汙沒飢抱海鳥為餐渴飲其血駕長潮為溜所吸不得開頭三四日無奈禱筊棹退潮溜入大洋飄十二日到臺余又語之曰呷板飄壞聞之粵東七八年矣爾之舟飄風於何處計風信而度之諒在斯矣至於潮水分合退為長長為退夾流雙開臨頭滙足易知近隔難識逺扞自有一定之理在乎海國形勢於胸中意㑹變通有可到處有不可到處安能處處而指識豈􅋵舟者把死木之所為哉則如南澳氣受四面流水吸入而不出古為落漈試問入而不出歸於何處豈氣下另有一海以收納乎四入者從上而入必從下而出如溪流湧急投以葦席入而出於他處此理甚明並以志之海國聞見録卷上
